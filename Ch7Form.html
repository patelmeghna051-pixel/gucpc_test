<html>  
<head>
     <title>Contact Page</title>
</head>
<body>
     <h1>Contact Page</h1>
     <p>Personal Details</p>

     <form>
         <p>Salutation</p>
         <select name="Salutation">
                 <option value="Mr.">Mr.</option>
                 <option value="Mrs.">Mrs.</option>
                 <option value="Miss">Miss</option>
         </select>
         <br /> <br />

         <label>First Name</label>
         <input type="text" name="Firstname" maxlength="10" placeholder="Enter your firstname" /> 
                
         <br /> <br />
         <label>Last Name</label>
         <input type="text" name="Lastname" maxlength="10" placeholder="Enter your lastname" />
        
         <br /> <br />
         <label>Gender</label>
         <input type="radio" name="gender" value="Male" />Male
         <input type="radio" name="gender" value="Female" />Female
         <input type="radio" name="gender" value="Other" />Other
    
         <br /> <br />
         <label>Select Language</label>
         <input type="radio" name="Language" id="Eng" value="English" />
         <label for="Eng">English</label>

         <br /> <br />
         <label>Email</label>
         <input type="email" name="Email" placeholder="Enter your email address" />

         <br /> <br />
         <label>Date of Birth</label>
         <input type="date" name="DOB" />

         <br /> <br />
         <label>Address</label>
         <textarea cols="10" rows="5"> </textarea>

         <br /> <br />
         <label>Password</label>
         <input type="password" placeholder="Enter 8 char password" maxlength="8" />
        
         <br /> <br />
         <label>Age</label>
         <input type="number" max="10" min="0" placeholder="Enter your age" /> 
      
         <br /> <br />
         <input type="submit">

       </form>
     </body>
 </html>
